apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: votesahayak
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      serviceAccountName: votesahayak-runner@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/votesahayak/votesahayak:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: ENABLE_FIREBASE_AUTH
              value: "true"
            - name: REQUIRE_AUTH
              value: "false"
            - name: FIREBASE_PROJECT_ID
              value: election-9ad36
            - name: FIREBASE_WEB_API_KEY
              value: AIzaSyDW22owRtHMDv5MGhLyHv-X9g21wOr09_Y
            - name: FIREBASE_AUTH_DOMAIN
              value: election-9ad36.firebaseapp.com
            - name: FIREBASE_WEB_APP_ID
              value: 1:495082661814:web:8401b6b65a8630914e8317
            - name: FIREBASE_STORAGE_BUCKET
              value: election-9ad36.firebasestorage.app
            - name: FIREBASE_MESSAGING_SENDER_ID
              value: "495082661814"
            - name: FIREBASE_MEASUREMENT_ID
              value: G-KL9HM4G1L9
            - name: RATE_LIMIT_MAX
              value: "120"
            - name: CHAT_RATE_LIMIT_MAX
              value: "12"
            - name: CACHE_TTL_MS
              value: "300000"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
